<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product Review Form">
  <meta name="author" content="Joseph Anucha">

  <title>Product Review</title>

  <link rel="stylesheet" href="styles/form.css">

  <script src="scripts/form.js" defer></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>

  <form method="get" action="review.html">

    <label for="productName">Product Name *</label>

    <select id="productName" name="productName" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <fieldset>
      <legend>Overall Rating *</legend>

      <label>
        <input type="radio" name="rating" value="1" required>
        ☆
      </label>

      <label>
        <input type="radio" name="rating" value="2">
        ☆☆
      </label>

      <label>
        <input type="radio" name="rating" value="3">
        ☆☆☆
      </label>

      <label>
        <input type="radio" name="rating" value="4">
        ☆☆☆☆
      </label>

      <label>
        <input type="radio" name="rating" value="5">
        ☆☆☆☆☆
      </label>

    </fieldset>

    <label for="installDate">Date of Installation *</label>

    <input
      type="date"
      id="installDate"
      name="installDate"
      required>

    <fieldset>
      <legend>Useful Features</legend>

      <label>
        <input type="checkbox"
          id="durability"
          name="features"
          value="Durability">
        Durability
      </label>

      <label>
        <input type="checkbox"
          id="ease"
          name="features"
          value="Ease of Use">
        Ease of Use
      </label>

      <label>
        <input type="checkbox"
          id="performance"
          name="features"
          value="Performance">
        Performance
      </label>

      <label>
        <input type="checkbox"
          id="design"
          name="features"
          value="Design">
        Design
      </label>

    </fieldset>

    <label for="review">Written Review</label>

    <textarea
      id="review"
      name="review"
      rows="5"></textarea>

    <label for="userName">Your Name</label>

    <input
      type="text"
      id="userName"
      name="userName">

    <input
      type="submit"
      value="Post Review">

  </form>

</main>

<footer>
  <p>
    © <span id="year"></span>
    | Joseph Anucha |
    Last Modified:
    <span id="lastModified"></span>
  </p>
</footer>

</body>
</html>
