<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dynamic Web Fundamentals W05 Assignment: Product Review Form">
  <meta name="author" content="Joseph Anucha">

  <title>Product Review</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/form.css">

  <script src="scripts/form.js" defer></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>

  <form method="get" action="review.html">

    <label for="productName">Product Name *</label>

    <select id="productName" name="productName" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <fieldset>
        <legend>Overall Rating *</legend>

        <input type="radio" id="rating1" name="rating" value="1" required>
        <label for="rating1">☆</label>

        <input type="radio" id="rating2" name="rating" value="2" required>
        <label for="rating2">☆☆</label>

        <input type="radio" id="rating3" name="rating" value="3" required>
        <label for="rating3">☆☆☆</label>

        <input type="radio" id="rating4" name="rating" value="4" required>
        <label for="rating4">☆☆☆☆</label>

        <input type="radio" id="rating5" name="rating" value="5" required>
        <label for="rating5">☆☆☆☆☆</label>
    </fieldset>

    <label for="installDate">Date of Installation *</label>

    <input
      type="date"
      id="installDate"
      name="installDate"
      required>

    <fieldset>
        <legend>Useful Features</legend>

        <input type="checkbox" id="durability" name="features" value="Durability">
        <label for="durability">Durability</label>

        <input type="checkbox" id="ease" name="features" value="Ease of Use">
        <label for="ease">Ease of Use</label>

        <input type="checkbox" id="performance" name="features" value="Performance">
        <label for="performance">Performance</label>

        <input type="checkbox" id="design" name="features" value="Design">
        <label for="design">Design</label>

    </fieldset>

    <label for="review">Written Review</label>
    <textarea
      id="review"
      name="review"
      rows="5"></textarea>

    <label for="userName">Your Name</label>
    <input
      type="text"
      id="userName"
      name="userName">

    <input
      type="submit"
      value="Post Review">

  </form>

</main>

<footer>
  <p>
    © <span id="year"></span>
    | Joseph Anucha |
    Last Modified:
    <span id="lastModified"></span>
  </p>
</footer>

</body>
</html>
